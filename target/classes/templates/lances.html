<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar Lance</title>
    <meta charset="UTF-8">
</head>
<body>

<main>
    <h2>Adicionar Lance</h2>

    <form th:action="@{'/editais/' + ${id} + '/lances'}" method="post">

        <label>Valor:</label>
        <input type="number" step="0.01" name="valor" />
        <br /><br />

        <label>Data do Lance:</label>
        <input type="date" name="data_lance" />
        <br /><br />

        <button type="submit">Salvar</button>

    </form>
</main>

</body>
</html>
