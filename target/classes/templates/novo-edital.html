<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Novo Edital</title>
</head>
<body>

<h2>Criar Novo Edital</h2>

<form th:action="@{/api/editais/criar}" method="post">

    <label>Título:</label>
    <input type="text" name="titulo" />
    <br><br>

    <label>Descrição:</label>
    <input type="text" name="descricao" />
    <br><br>

    <label>Data de Fechamento:</label>
    <input type="date" name="data_fechamento" />
    <br><br>

    <label>Status:</label>
    <input type="text" name="status" value="ABERTO" />
    <br><br>

    <button type="submit">Salvar</button>

</form>

</body>
</html>
