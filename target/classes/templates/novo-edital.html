<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Novo Edital</title>
</head>
<body>

<h2>Criar Novo Edital</h2>

<form th:action="@{/editais/criar}" th:object="${edital}" method="post">

    <input type="text" th:field="*{titulo}" placeholder="Título" />
    <br/>

    <input type="text" th:field="*{descricao}" placeholder="Descrição" />
    <br/>

    <input type="date" th:field="*{dataFechamento}" />
    <br/>

    <button type="submit">Criar</button>

</form>

</body>
</html>
