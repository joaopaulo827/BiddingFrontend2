<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela dos editais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
            <style>
            .editar{
                padding: 10px 20px;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background-color: black;
                color: white;
                cursor: pointer;
            }
            table {
            width: 50%;
            border-collapse: collapse;
            margin-top: 20px;
            }
            th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            width: 300px;
            }
            th {
            background-color: #f2f2f2;
            }
            .links{
                margin-top: 10px;
            }
        </style>
    <body>
<div th:replace="~{fragments/layout :: custom-header}"></div>

<h3>Bem-vindo à Lista de Editais</h3>

<table>
    <tr>
        <th>Título</th>
        <th>Descrição</th>
        <th>Data de fechamento</th>
        <th>Status</th>
        <th>Ações</th>
    </tr>

    <tr th:each="f : ${editais}">
        <td th:text="${f.titulo}"></td>
        <td th:text="${f.descricao}"></td>
        <td th:text="${f.dataFechamento}"></td>
        <td th:text="${f.status}"></td>
        <td>
            <a th:href="@{'/editais/lances/' + ${f.id}}">
                Dar Lance
            </a>
        </td>
    </tr>
</table>

<hr>

<h3>Criar novo edital</h3>

<form th:action="@{/editais/criar}" method="post">

    <input type="text" name="titulo" placeholder="Título" />
    <br/>

    <input type="text" name="descricao" placeholder="Descrição" />
    <br/>

    <input type="date" name="dataFechamento" />
    <br/>

    <button type="submit">Criar</button>

</form>

</body>
</html>
