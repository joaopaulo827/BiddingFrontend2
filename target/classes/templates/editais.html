<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tela dos editais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
            <style>
            .editar{
                padding: 10px 20px;
                font-size: 18px;
                border: none;
                border-radius: 8px;
                background-color: black;
                color: white;
                cursor: pointer;
            }
            table {
            width: 50%;
            border-collapse: collapse;
            margin-top: 20px;
            }
            th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
            width: 300px;
            }
            th {
            background-color: #f2f2f2;
            }
            .links{
                margin-top: 10px;
            }
        </style>
    <body>
<div th:replace="~{fragments/layout :: custom-header}"></div>
        <h3>Bem vindo a Lista de Editais</h3>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
            <table>
                <tr>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Data de fechamento</th>
                    <th>Status</th>
                </tr>
               <tr th:if="${edital != null}" th:each="f : ${edital}">
    <td th:text="${f.titulo}"></td>
    <td th:text="${f.descricao}"></td>
    <td th:text="${f.dataFechamento}"></td>
    <td th:text="${f.status}"></td>
    <td>
        <a th:href="@{'/editais/lances/' + ${f.id}}">
            Dar Lance
        </a>
    </td>
</tr>
    <a th:href="@{/editais/novo}">
    Criar novo edital
</a>
    </body>
</html>
